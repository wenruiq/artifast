<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Artifast Sandbox</title>

    <!-- Warm up TLS connections to the CDNs libraries are lazy-loaded from -->
    <link rel="preconnect" href="https://esm.sh" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="preconnect" href="https://unpkg.com" crossorigin />
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
    <link rel="preconnect" href="https://cdn.plot.ly" crossorigin />

    <!-- Tailwind CSS v4 Browser Runtime (core: styling applies immediately) -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4" crossorigin></script>

    <!--
      Libraries are NOT loaded here. Babel and every artifact library are
      lazy-loaded on demand by the module script below, so a first load only
      pays for React + Tailwind instead of ~13 MB of CDN bundles.
    -->

    <!-- Import map: all React-ecosystem imports resolve to esm.sh -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.3.1",
        "react/": "https://esm.sh/react@18.3.1/",
        "react-dom": "https://esm.sh/react-dom@18.3.1",
        "react-dom/": "https://esm.sh/react-dom@18.3.1/"
      }
    }
    </script>

    <style>
      :root {
        --background: 0 0% 100%;
        --foreground: 240 10% 3.9%;
        --card: 0 0% 100%;
        --card-foreground: 240 10% 3.9%;
        --popover: 0 0% 100%;
        --popover-foreground: 240 10% 3.9%;
        --primary: 240 5.9% 10%;
        --primary-foreground: 0 0% 98%;
        --secondary: 240 4.8% 95.9%;
        --secondary-foreground: 240 5.9% 10%;
        --muted: 240 4.8% 95.9%;
        --muted-foreground: 240 3.8% 46.1%;
        --accent: 240 4.8% 95.9%;
        --accent-foreground: 240 5.9% 10%;
        --destructive: 0 84.2% 60.2%;
        --destructive-foreground: 0 0% 98%;
        --border: 240 5.9% 90%;
        --input: 240 5.9% 90%;
        --ring: 240 5.9% 10%;
        --radius: 0.5rem;
        --chart-1: 12 76% 61%;
        --chart-2: 173 58% 39%;
        --chart-3: 197 37% 24%;
        --chart-4: 43 74% 66%;
        --chart-5: 27 87% 67%;
      }
      .dark {
        --background: 240 10% 3.9%;
        --foreground: 0 0% 98%;
        --card: 240 10% 3.9%;
        --card-foreground: 0 0% 98%;
        --popover: 240 10% 3.9%;
        --popover-foreground: 0 0% 98%;
        --primary: 0 0% 98%;
        --primary-foreground: 240 5.9% 10%;
        --secondary: 240 3.7% 15.9%;
        --secondary-foreground: 0 0% 98%;
        --muted: 240 3.7% 15.9%;
        --muted-foreground: 240 5% 64.9%;
        --accent: 240 3.7% 15.9%;
        --accent-foreground: 0 0% 98%;
        --destructive: 0 62.8% 30.6%;
        --destructive-foreground: 0 0% 98%;
        --border: 240 3.7% 15.9%;
        --input: 240 3.7% 15.9%;
        --ring: 240 4.9% 83.9%;
      }
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background-color: #fff; color: #000; }
      #root { min-height: 100vh; }
      .sandbox-error {
        padding: 16px;
        color: #ef4444;
        font-family: monospace;
        white-space: pre-wrap;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="module">
      // Core React ecosystem (single React instance shared by all libs)
      import React from 'react';
      import * as ReactDOM from 'react-dom';
      import { createRoot } from 'react-dom/client';

      window.React = React;
      window.ReactDOM = ReactDOM;

      // --- On-demand library loader -------------------------------------
      // Each artifact library is fetched only when an artifact imports it,
      // keyed by the global name the import-rewriter assigns. URLs match the
      // builds that were previously eager-loaded, so runtime behaviour is
      // unchanged — only the timing differs.
      const SCRIPT = 'script';
      const ESM = 'esm';
      const LIBRARY_SOURCES = {
        Babel:       [SCRIPT, 'https://unpkg.com/@babel/standalone/babel.min.js'],
        LucideReact: [ESM, 'https://esm.sh/lucide-react@0.460.0?external=react'],
        Recharts:    [ESM, 'https://esm.sh/recharts@2.15.0?external=react,react-dom'],
        ShadcnUI:    [ESM, 'https://esm.sh/shadcdn@0.0.8?external=react,react-dom'],
        FramerMotion:[ESM, 'https://esm.sh/framer-motion@11.18.2?external=react,react-dom'],
        d3:          [SCRIPT, 'https://unpkg.com/d3@7/dist/d3.min.js'],
        THREE:       [SCRIPT, 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js'],
        _:           [SCRIPT, 'https://unpkg.com/lodash@4/lodash.min.js'],
        Chart:       [SCRIPT, 'https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js'],
        Plotly:      [SCRIPT, 'https://cdn.plot.ly/plotly-2.35.2.min.js'],
        Tone:        [SCRIPT, 'https://cdn.jsdelivr.net/npm/tone@15/build/Tone.min.js'],
        Papa:        [SCRIPT, 'https://cdn.jsdelivr.net/npm/papaparse@5/papaparse.min.js'],
        XLSX:        [SCRIPT, 'https://cdn.jsdelivr.net/npm/xlsx@0.18/dist/xlsx.full.min.js'],
        mammoth:     [SCRIPT, 'https://cdn.jsdelivr.net/npm/mammoth@1/mammoth.browser.min.js'],
        math:        [SCRIPT, 'https://cdn.jsdelivr.net/npm/mathjs@13/lib/browser/math.min.js'],
        tf:          [SCRIPT, 'https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4/dist/tf.min.js'],
      };

      function loadScript(src) {
        return new Promise((resolve, reject) => {
          const el = document.createElement('script');
          el.src = src;
          el.crossOrigin = 'anonymous';
          el.onload = () => resolve();
          el.onerror = () => reject(new Error('Failed to load ' + src));
          document.head.appendChild(el);
        });
      }

      function loadEsm(url, globalName) {
        return import(url)
          .then((mod) => { window[globalName] = mod; })
          .catch((err) => {
            console.warn(globalName + ' failed to load:', err);
            window[globalName] = {};
          });
      }

      // De-dupe: each library loads at most once for the lifetime of the frame.
      const pending = new Map();
      function ensureLibrary(globalName) {
        const source = LIBRARY_SOURCES[globalName];
        if (!source) return Promise.resolve(); // core/unknown — nothing to fetch
        if (!pending.has(globalName)) {
          const [kind, url] = source;
          pending.set(
            globalName,
            kind === ESM ? loadEsm(url, globalName) : loadScript(url)
          );
        }
        return pending.get(globalName);
      }

      // Babel is needed for every render — start fetching now (in the
      // background) and await it at render time so `ready` isn't blocked on it.
      const babelReady = ensureLibrary('Babel');

      const rootEl = document.getElementById('root');
      let reactRoot = null;

      // ErrorBoundary
      class ErrorBoundary extends React.Component {
        constructor(props) {
          super(props);
          this.state = { error: null };
        }
        static getDerivedStateFromError(error) {
          return { error };
        }
        componentDidCatch(error) {
          window.parent.postMessage(
            { type: 'render-error', error: error.message || String(error) },
            '*'
          );
        }
        render() {
          if (this.state.error) {
            return React.createElement(
              'div',
              { className: 'sandbox-error' },
              'Runtime Error: ' + (this.state.error.message || String(this.state.error))
            );
          }
          return this.props.children;
        }
      }

      function clearRoot() {
        if (reactRoot) {
          reactRoot.unmount();
          reactRoot = null;
        }
        rootEl.innerHTML = '';
      }

      // Monotonic token so a slow render (awaiting a heavy library) can't
      // overwrite a newer one that finished first.
      let renderSeq = 0;

      async function handleRender(data) {
        const seq = ++renderSeq;

        // Unmount old component first so stale UI never persists on error
        clearRoot();

        try {
          // Babel + only the libraries this artifact imports, loaded on demand.
          await babelReady;
          await Promise.all((data.libraries || []).map(ensureLibrary));

          // A newer render superseded this one while libraries were loading.
          if (seq !== renderSeq) return;

          const transformed = Babel.transform(data.code, {
            presets: ['react', 'typescript'],
            filename: 'artifact.tsx',
          }).code;

          const fn = new Function(
            'React',
            'ReactDOM',
            'LucideReact',
            'Recharts',
            'd3',
            'THREE',
            '_',
            'ShadcnUI',
            'Chart',
            'Plotly',
            'Tone',
            'Papa',
            'XLSX',
            'mammoth',
            'math',
            'tf',
            'FramerMotion',
            transformed + '\nreturn ' + data.componentName + ';'
          );

          const Component = fn(
            React,
            ReactDOM,
            window.LucideReact || {},
            window.Recharts || {},
            window.d3 || {},
            window.THREE || {},
            window._ || function(){},
            window.ShadcnUI || {},
            window.Chart || {},
            window.Plotly || {},
            window.Tone || {},
            window.Papa || {},
            window.XLSX || {},
            window.mammoth || {},
            window.math || {},
            window.tf || {},
            window.FramerMotion || {}
          );

          if (!Component) {
            throw new Error('Component "' + data.componentName + '" not found in code');
          }

          reactRoot = createRoot(rootEl);

          reactRoot.render(
            React.createElement(ErrorBoundary, { key: Date.now() },
              React.createElement(Component)
            )
          );

          window.parent.postMessage({ type: 'render-success' }, '*');
        } catch (err) {
          const errorType = err.message && err.message.includes('Unexpected token')
            ? 'transpile-error'
            : 'render-error';
          window.parent.postMessage(
            { type: errorType, error: err.message || String(err) },
            '*'
          );
        }
      }

      window.addEventListener('message', (event) => {
        if (!event.data || typeof event.data.type !== 'string') return;

        if (event.data.type === 'render') {
          handleRender(event.data);
        } else if (event.data.type === 'clear') {
          clearRoot();
        }
      });

      // Core is up (React + message handler). Signal ready immediately —
      // Babel and artifact libraries stream in on demand at render time.
      window.parent.postMessage({ type: 'ready' }, '*');
    </script>
  </body>
</html>
